# Kubeflow and Vertex AI pipeline defaults.
# Keep credentials and machine-specific values in environment variables.

pipeline_name: machledata-ml-pipeline
image_uri: ${MACHLEDATA_PIPELINE_IMAGE}
pipeline_package_path: artifacts/pipelines/machledata_pipeline.yaml
pipeline_root: ${VERTEX_PIPELINE_ROOT}
project_id: ${GOOGLE_CLOUD_PROJECT}
region: ${VERTEX_REGION}
service_account: ${VERTEX_SERVICE_ACCOUNT}
artifact_root: /tmp/machledata-artifacts
run_label: manual
min_detections_per_image: 0.1
