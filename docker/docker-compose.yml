# Local service composition for API and dashboard development.

services:
  api:
    image: ${MACHLEDATA_IMAGE:-machledata:local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m uvicorn apps.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dashboard:
    image: ${MACHLEDATA_IMAGE:-machledata:local}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: streamlit run apps/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    restart: unless-stopped
