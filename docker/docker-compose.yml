# Local service composition for development and Airflow orchestration demos.

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__WEBSERVER__RBAC: "true"
    MACHLEDATA_ARTIFACT_ROOT: /opt/airflow/artifacts
    PYTHONPATH: /opt/machledata/src:/opt/machledata:/opt/airflow/dags
  volumes:
    - ../workflows:/opt/airflow/dags
    - ../src:/opt/machledata/src
    - ../configs:/opt/machledata/configs
    - ../scripts:/opt/machledata/scripts
    - ../artifacts:/opt/airflow/artifacts
    - ../.airflow/logs:/opt/airflow/logs
    - ../.airflow/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -lc
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/plugins /opt/airflow/artifacts
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname MachLe \
          --lastname Data \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m uvicorn apps.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

volumes:
  postgres-db-volume:
